name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java Environment (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Patch Gradle version to 8.x (Expo-compatible)
        run: |
          sed -i 's|gradle-9.*-bin.zip|gradle-8.13-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Symlink node_modules into android for Gradle resolution
        run: ln -sf ${{ github.workspace }}/node_modules ${{ github.workspace }}/android/node_modules

      - name: Test node resolution from android dir (with stderr)
        working-directory: android
        run: |
          echo "Testing from android dir:"
          node -e "try { console.log(require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })); } catch(e) { console.error('ERROR:', e.message); }" 2>&1 || true
          node -e "try { console.log(require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })); } catch(e) { console.error('ERROR:', e.message); }" 2>&1 || true

      - name: Build APK locally
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aurelia-APK
          path: android/app/build/outputs/apk/release/app-release.apk
