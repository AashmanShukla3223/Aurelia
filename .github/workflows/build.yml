name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java Environment (for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Patch Gradle version to 8.x (Expo-compatible)
        run: |
          sed -i 's|gradle-9.*-bin.zip|gradle-8.13-bin.zip|g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK locally
        run: |
          cd android
          ./gradlew assembleRelease --debug 2>&1 | grep -E "(node|require|Cannot find|error|Error|FAILURE|failed)" | head -50 || true
          ./gradlew assembleRelease

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aurelia-APK
          path: android/app/build/outputs/apk/release/app-release.apk
